<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — Roman Krzmarzick</title>
<meta name="description" content="Get in touch with Roman Krzmarzick — mechanical engineering student at St. Ambrose University. Email, LinkedIn, GitHub, or send a message directly.">
<link rel="canonical" href="https://romankrzmarzick.github.io/contact.html">
<meta name="theme-color" content="#07080d">
<meta property="og:type" content="website">
<meta property="og:title" content="Contact — Roman Krzmarzick">
<meta property="og:description" content="Email, LinkedIn, GitHub, or send a message directly.">
<meta property="og:url" content="https://romankrzmarzick.github.io/contact.html">
<meta property="og:image" content="https://romankrzmarzick.github.io/assets/img/og.svg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/css/styles.css">
<script>
  (function () {
    try {
      var t = localStorage.getItem("rk-theme");
      if (!t) t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<script src="assets/js/content.js" defer></script>
<script src="assets/js/site.js" defer></script>
</head>
<body data-page="contact">

<a class="skip-link" href="#main">Skip to content</a>
<header id="site-header"></header>

<main id="main">

  <section class="section" aria-labelledby="contact-heading">
    <div class="container">

      <div data-reveal style="margin-bottom:clamp(2.5rem,5vw,3.5rem)">
        <span class="eyebrow">Contact</span>
        <h1 id="contact-heading">Let's talk.</h1>
        <p class="lead" id="contact-blurb" style="max-width:52ch;margin-top:1rem"></p>
      </div>

      <div class="contact-grid">

        <!-- Form -->
        <div class="card" data-reveal style="--delay:80ms;padding:clamp(1.5rem,3vw,2.25rem)">
          <h2 style="font-size:clamp(1.25rem,2.2vw,1.5rem);margin-bottom:1.5rem">Send a message</h2>

          <form class="form-grid" id="contact-form" novalidate>
            <div class="field">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required autocomplete="name" placeholder="Your name">
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
            </div>

            <div class="field">
              <label for="subject">Subject <span class="hint">(optional)</span></label>
              <input type="text" id="subject" name="subject" placeholder="What's this about?">
            </div>

            <div class="field">
              <label for="message">Message</label>
              <textarea id="message" name="message" required placeholder="Tell me what you're working on…"></textarea>
            </div>

            <div class="btn-row">
              <button class="btn btn-primary" type="submit" id="form-submit">Send message</button>
            </div>

            <p class="form-status" id="form-status" role="status" aria-live="polite" hidden></p>

            <p class="form-note">
              Prefer email? Write to
              <a href="mailto:romankrzmarzick@gmail.com" style="color:var(--accent)">romankrzmarzick@gmail.com</a>
              directly.
            </p>
          </form>
        </div>

        <!-- Direct links -->
        <div data-reveal style="--delay:160ms">
          <h2 style="font-size:clamp(1.25rem,2.2vw,1.5rem);margin-bottom:1.25rem">Find me elsewhere</h2>
          <ul class="contact-list" id="contact-list"></ul>

          <div class="card" style="margin-top:1.5rem">
            <h3>Response time</h3>
            <p>
              I check email daily and reply to everything that isn't spam — usually within
              a day or two.
            </p>
          </div>
        </div>

      </div>
    </div>
  </section>

</main>

<footer id="site-footer"></footer>
</body>
</html>
