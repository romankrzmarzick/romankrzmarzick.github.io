<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img"
     aria-label="Roman Krzmarzick — Mechanical Engineering Major">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf8f0"/>
      <stop offset="100%" stop-color="#f4ead9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc86c"/>
      <stop offset="100%" stop-color="#f0983a"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b2119"/>
      <stop offset="55%" stop-color="#a24f0a"/>
      <stop offset="100%" stop-color="#e08a1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.02" r="0.75">
      <stop offset="0%" stop-color="#f8b254" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f8b254" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.02" cy="0.98" r="0.6">
      <stop offset="0%" stop-color="#ff9c5c" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff9c5c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#7a5222" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(90, 150)">
    <rect width="72" height="72" rx="18" fill="url(#gold)"/>
    <text x="36" y="49" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="30" font-weight="700" fill="#3a2408">RK</text>
  </g>

  <text x="90" y="330" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="76" font-weight="700" fill="#2b2119" letter-spacing="-3">Roman Krzmarzick</text>

  <text x="90" y="402" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="36" font-weight="600" fill="url(#ink)" letter-spacing="-1">Mechanical engineering major.</text>

  <text x="90" y="468" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="27" fill="#6b5c4b">St. Ambrose University &#183; Bettendorf, Iowa &#183; Class of 2030</text>

  <rect x="90" y="522" width="150" height="4" rx="2" fill="url(#gold)"/>
</svg>
