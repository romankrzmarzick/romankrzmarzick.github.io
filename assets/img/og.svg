<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img"
     aria-label="Roman Krzmarzick — Mechanical Engineering Student">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d14"/>
      <stop offset="100%" stop-color="#07080d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd58a"/>
      <stop offset="100%" stop-color="#f5b544"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.05" r="0.7">
      <stop offset="0%" stop-color="#f5b544" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f5b544" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.9" r="0.6">
      <stop offset="0%" stop-color="#6ea8ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6ea8ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="62" height="62" patternUnits="userSpaceOnUse">
      <path d="M62 0H0V62" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(90, 150)">
    <rect width="72" height="72" rx="18" fill="url(#gold)"/>
    <text x="36" y="49" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="30" font-weight="700" fill="#12140c">RK</text>
  </g>

  <text x="90" y="330" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="76" font-weight="700" fill="#eef0f6" letter-spacing="-3">Roman Krzmarzick</text>

  <text x="90" y="404" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="38" font-weight="600" fill="url(#gold)" letter-spacing="-1">Mechanical engineer who writes code.</text>

  <text x="90" y="470" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="27" fill="#9aa1b4">St. Ambrose University &#183; Davenport, Iowa &#183; Class of 2030</text>

  <rect x="90" y="524" width="150" height="4" rx="2" fill="url(#gold)"/>
</svg>
